<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find-it AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Find-it AI</h1>
            <p>Your smart procurement assistant</p>
        </header>

        <main id="chat-container">
            <!-- Welcome Message -->
            <div class="message ai-message">
                <div class="bubble">
                    Hello! I'm Find-it AI. Tell me what you're looking for, your budget, and location (e.g., "Nasi Padang in Bekasi under 25k").
                </div>
            </div>
        </main>

        <div class="input-area">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type your request..." autocomplete="off">
                <button type="submit">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
                        <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                    </svg>
                </button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
